issuer: 123-3D
keywords:
  - 123-3D
required_fields:
  - date
  - issuer
fields:
  date:
    parser: regex
    regex:
      - (?:Factuurdatum|Datum)[:\s]*(\d{1,2}[/\-\.]\d{1,2}[/\-\.]\d{4})
      - (?:Factuurdatum|Datum)[:\s]*(\d{1,2}\s*\w+\s*\d{4})
    type: date
  invoice_number:
    parser: regex
    regex: (?:Factuurnummer|Factuur)[:\s]*(\S+)
options:
  currency: EUR
  date_formats:
    - '%d/%m/%Y'
    - '%d-%m-%Y'
    - '%d %B %Y'
