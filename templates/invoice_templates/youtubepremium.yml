issuer: YouTubePremium
keywords:
  - YouTube
required_fields:
  - date
  - issuer
fields:
  date:
    parser: regex
    regex:
      - (?:Invoice date|Transaction date|Date)[:\s]*(\w+\s+\d{1,2},?\s+\d{4})
      - (?:Date)[:\s]*(\d{1,2}[/\-\.]\d{1,2}[/\-\.]\d{4})
      - (?:aanrekening van)[:\s]*(\d{1,2}\s*\w+\s*\d{4})
    type: date
  invoice_number:
    parser: regex
    regex: (?:Transaction ID|Order|Invoice)[:\s#]*(\S+)
options:
  currency: EUR
  date_formats:
    - '%B %d, %Y'
    - '%b %d, %Y'
    - '%d/%m/%Y'
