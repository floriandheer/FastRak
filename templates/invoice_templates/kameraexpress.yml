issuer: KameraExpress
keywords:
  - Kamera Express
required_fields:
  - date
  - issuer
fields:
  date:
    parser: regex
    regex:
      - (?:Factuurdatum|Datum|Date)[:\s]*(\d{1,2}[/\-\.]\d{1,2}[/\-\.]\d{4})
      - (?:Datum|Date)[:\s]*(\d{1,2}\s*\w+\s*\d{4})
      - (?:aanrekening van)[:\s]*(\d{1,2}\s*\w+\s*\d{4})
    type: date
  invoice_number:
    parser: regex
    regex: (?:Factuurnummer|Ordernummer|Order)[:\s]*(\S+)
options:
  currency: EUR
  date_formats:
    - '%d/%m/%Y'
    - '%d-%m-%Y'
    - '%d %B %Y'
