issuer: WPOvernight
keywords:
  - WP Overnight
required_fields:
  - date
  - issuer
fields:
  date:
    parser: regex
    regex:
      - (?:Invoice date|Date)[:\s]*(\d{4}[/\-\.]\d{1,2}[/\-\.]\d{1,2})
      - (?:Invoice date|Date)[:\s]*(\d{1,2}[/\-\.]\d{1,2}[/\-\.]\d{4})
      - (?:Invoice date|Date)[:\s]*(\w+\s+\d{1,2},?\s+\d{4})
    type: date
  invoice_number:
    parser: regex
    regex: (?:Invoice|Invoice number)[:\s]*(\S+)
options:
  currency: EUR
  date_formats:
    - '%Y-%m-%d'
    - '%d/%m/%Y'
    - '%B %d, %Y'
