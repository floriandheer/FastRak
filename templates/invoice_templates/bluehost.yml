issuer: Bluehost
keywords:
  - Bluehost
required_fields:
  - date
  - issuer
fields:
  date:
    parser: regex
    regex:
      - (?:Invoice date|Date|Billing date)[:\s]*(\w+\s+\d{1,2},?\s+\d{4})
      - (?:Invoice date|Date)[:\s]*(\d{1,2}[/\-\.]\d{1,2}[/\-\.]\d{4})
      - (?:aanrekening van)[:\s]*(\d{1,2}\s*\w+\s*\d{4})
    type: date
  invoice_number:
    parser: regex
    regex: (?:Invoice|Invoice #|Order)[:\s]*(\S+)
options:
  currency: USD
  date_formats:
    - '%B %d, %Y'
    - '%b %d, %Y'
    - '%m/%d/%Y'
    - '%d/%m/%Y'
