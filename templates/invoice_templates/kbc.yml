issuer: KBC
keywords:
  - KBC
required_fields:
  - date
  - issuer
fields:
  date:
    parser: regex
    regex:
      - (?:Datum|Factuurdatum|Afrekening)[:\s]*(\d{1,2}[/\-\.]\d{1,2}[/\-\.]\d{4})
      - (?:Datum|Afrekening)[:\s]*(\d{1,2}\s*\w+\s*\d{4})
      - (?:aanrekening van)[:\s]*(\d{1,2}\s*\w+\s*\d{4})
    type: date
  invoice_number:
    parser: regex
    regex: (?:Referentie|Kenmerk|Nummer)[:\s]*(\S+)
options:
  currency: EUR
  date_formats:
    - '%d/%m/%Y'
    - '%d-%m-%Y'
    - '%d %B %Y'
