issuer: Google
keywords:
  - Google
required_fields:
  - date
  - issuer
fields:
  date:
    parser: regex
    regex:
      - (?:Invoice date|Factuurdatum|Date)\s*[:\s]\s*(\w+ \d{1,2},? \d{4})
      - (?:Invoice date|Factuurdatum|Date)\s*[:\s]\s*(\d{1,2}[/\-.]\d{1,2}[/\-.]\d{4})
      - (?:aanrekening van)\s*[:\s]\s*(\d{1,2}\s*\w+\s*\d{4})
    type: date
  invoice_number:
    parser: regex
    regex: (?:Invoice number|Factuurnummer|Invoice #)\s*[:\s]\s*(\S+)
options:
  currency: EUR
  date_formats:
    - '%b %d, %Y'
    - '%B %d, %Y'
    - '%d/%m/%Y'
    - '%d-%m-%Y'
    - '%d %b %Y'
    - '%d %B %Y'
